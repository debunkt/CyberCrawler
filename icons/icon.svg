<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#020b18"/>
  <rect x="25" y="25" width="462" height="462" fill="none" stroke="#00e5ff" stroke-width="20"/>
  <text x="256" y="310" font-family="monospace" font-size="280" font-weight="bold"
        fill="#00e5ff" text-anchor="middle" filter="url(#glow)">@</text>
  <defs>
    <filter id="glow">
